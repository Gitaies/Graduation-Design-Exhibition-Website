# ============================================================
# 本地 Nginx 静态托管 — 生产模式
# 静态文件直读，无需 Node.js 进程
# 访问地址：http://localhost 或 http://192.168.x.x
# ============================================================

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
      text/plain
      text/css
      application/json
      application/javascript
      text/xml
      image/svg+xml;

    # 后端 upstream（Rust axum :8080）
    upstream backend {
        server 127.0.0.1:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # Nuxt 静态文件根目录
        set $nuxt_root "D:/资料/软件工程/传媒技术学院2026界毕业设计展网页/frontend/.output/public";

        # 静态资源 — 长缓存（文件名含哈希）
        location /_nuxt/ {
            alias "$nuxt_root/_nuxt/";
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        # 后端 API 代理
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 前端页面 — 预渲染的静态 HTML
        location / {
            root $nuxt_root;
            try_files $uri $uri/index.html $uri.html =404;
        }
    }
}
