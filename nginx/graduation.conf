# ============================================================
# 传媒技术学院 2026 届毕业设计展 - Nginx 生产配置
# 使用前：将 yourdomain.com 替换为真实域名
# ============================================================

worker_processes auto;

events {
    worker_connections 2048;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
      text/plain
      text/css
      application/json
      application/javascript
      text/xml
      image/svg+xml;

    # 基础限流
    limit_req_zone  $binary_remote_addr  zone=api:10m    rate=10r/s;
    limit_req_zone  $binary_remote_addr  zone=like:10m   rate=2r/s;

    # 后端 upstream（Rust axum :8080）
    upstream backend {
        server 127.0.0.1:8080;
        keepalive 64;
    }

    # ===================== HTTP → HTTPS 重定向 =====================
    server {
        listen 80;
        server_name yourdomain.com www.yourdomain.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ===================== HTTPS 主配置 =====================
    server {
        listen 443 ssl http2;
        server_name yourdomain.com www.yourdomain.com;

        # SSL 证书（certbot 自动填入）
        ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

        # SSL 安全
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;

        # 安全响应头
        add_header X-Frame-Options           "SAMEORIGIN"                     always;
        add_header X-Content-Type-Options    "nosniff"                        always;
        add_header X-XSS-Protection          "1; mode=block"                  always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000"               always;

        client_max_body_size 2m;

        # Nuxt 静态文件根目录
        set $nuxt_root "/path/to/frontend/.output/public";

        # 静态资源 — 长缓存
        location /_nuxt/ {
            alias "$nuxt_root/_nuxt/";
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        # 后端 API（含限流）
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 点赞接口更严格限流
            location ~ ^/api/works/[^/]+/like/toggle$ {
                limit_req zone=like burst=3 nodelay;
                limit_req_status 429;

                proxy_pass http://backend;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host              $host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
        }

        # 前端页面
        location / {
            root $nuxt_root;
            try_files $uri $uri/index.html $uri.html =404;
        }

        # 日志
        access_log /var/log/nginx/graduation_access.log;
        error_log  /var/log/nginx/graduation_error.log;
    }
}
