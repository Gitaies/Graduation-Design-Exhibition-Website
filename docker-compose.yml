services:
  mysql:
    image: mysql:8.0
    container_name: media-tech-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: graduation_exhibition
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations:/docker-entrypoint-initdb.d
    networks:
      - exhibition-network
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: media-tech-redis
    ports:
      - "6379:6379"
    networks:
      - exhibition-network

volumes:
  mysql_data:

networks:
  exhibition-network:
    driver: bridge
